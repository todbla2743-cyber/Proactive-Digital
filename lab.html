<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Lab — Proactive Digital</title>
<meta name="robots" content="noindex, nofollow"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --teal:  #00BFC7; --blue:  #2159E0; --grad:  linear-gradient(120deg,#00BFC7,#2159E0);
  --bg:    #080B13; --bg2:   #0C1020; --bg3:   #111827; --surf:  #161D2E;
  --bdr:   rgba(255,255,255,0.06); --bdr2:  rgba(255,255,255,0.12);
  --tx:    #E8EAF6; --tx2:   #6B7A99; --fh:    'Outfit',sans-serif; --fb:    'Plus Jakarta Sans',sans-serif;
  --ease:  cubic-bezier(.22,1,.36,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:var(--fb);font-size:15px;line-height:1.65;overflow-x:hidden;-webkit-font-smoothing:antialiased;min-height:100vh}
button{font-family:var(--fb);border:none;cursor:pointer}

/* ── LOGIN ── */
#login-screen {position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;transition:opacity .5s var(--ease)}
#login-screen.out{opacity:0;pointer-events:none}
.login-card{background:var(--surf);border:1px solid var(--bdr2);border-radius:16px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 32px 80px rgba(0,0,0,.5)}
.login-input{width:100%;background:var(--bg2);border:1.5px solid var(--bdr2);border-radius:9px;padding:13px 16px;color:var(--tx);outline:none;margin-top:20px}
.login-btn{width:100%;margin-top:20px;padding:14px;background:var(--grad);color:#fff;border-radius:9px;font-weight:600}

/* ── DASHBOARD ── */
#dashboard{display:none}
.lab-nav{position:sticky;top:0;z-index:100;background:rgba(8,11,19,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);padding:14px 0}
.lab-nav-in{max-width:1200px;margin:0 auto;padding:0 28px;display:flex;align-items:center;justify-content:space-between}
.tab-nav{display:flex;gap:8px;margin-bottom:32px;border-bottom:1px solid var(--bdr)}
.tab-btn{padding:10px 24px;font-size:14px;font-weight:600;color:var(--tx2);background:none;border-bottom:2px solid transparent;cursor:pointer}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal)}

/* ── CLIENTS ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:18px 20px}
.stat-value{font-family:var(--fh);font-weight:600;font-size:28px}
.client-card{background:var(--surf);border:1px solid var(--bdr);border-radius:14px;padding:22px;margin-bottom:12px}
.pay-schedule{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin:14px 0}
.pay-block{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:10px;cursor:pointer}
.pay-block.paid{border-color:var(--teal);background:rgba(0,191,199,0.05)}

/* ── MODALS ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surf);padding:32px;border-radius:16px;width:100%;max-width:480px}
.modal-input,.modal-select{width:100%;background:var(--bg2);border:1px solid var(--bdr2);padding:12px;border-radius:8px;color:#fff;margin-bottom:12px}

/* Rest of standard Lab styles... */
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h2 style="text-align:center">The Lab</h2>
    <input type="password" class="login-input" id="passInput" placeholder="Access Code"/>
    <button class="login-btn" onclick="tryLogin()">Enter →</button>
  </div>
</div>

<div id="dashboard">
  <nav class="lab-nav">
    <div class="lab-nav-in">
      <div><strong>Command Center</strong></div>
      <button onclick="location.reload()" style="background:none;color:var(--tx2)">Sign Out</button>
    </div>
  </nav>

  <main style="max-width:1200px;margin:0 auto;padding:36px 28px">
    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('clients',this)">Clients</button>
      <button class="tab-btn" onclick="switchTab('news',this)">News</button>
      <button class="tab-btn" onclick="switchTab('ai',this)">AI Assistant</button>
      <button class="tab-btn" onclick="switchTab('notes',this)">Notes</button>
    </div>

    <div id="clients-panel" class="tab-content active">
      <div class="stats-row">
        <div class="stat-card"><div>Active</div><div class="stat-value" id="statActive">0</div></div>
        <div class="stat-card"><div>Revenue</div><div class="stat-value" id="statPaid">$0</div></div>
        <div class="stat-card"><div>Due</div><div class="stat-value" id="statDue">$0</div></div>
        <div class="stat-card"><div>Pipeline</div><div class="stat-value" id="statPipeline">$0</div></div>
      </div>
      <button class="login-btn" style="width:auto;padding:10px 20px" onclick="openModal()">+ Add Client</button>
      <div id="clientsList" style="margin-top:24px"></div>
    </div>

    <div id="news-panel" class="tab-content" style="display:none"><h3>Industry News Feed Restored</h3><div id="newsGrid"></div></div>
    <div id="ai-panel" class="tab-content" style="display:none"><h3>Private AI Restored</h3></div>
    <div id="notes-panel" class="tab-content" style="display:none"><h3>Notes Restored</h3><textarea style="width:100%;height:400px;background:var(--bg2);color:#fff"></textarea></div>
  </main>
</div>

<div class="modal-overlay" id="clientModal">
  <div class="modal">
    <h3>New Project</h3>
    <input type="text" id="c_name" class="modal-input" placeholder="Client Name"/>
    <input type="number" id="c_total" class="modal-input" placeholder="Total Project Value"/>
    <label style="font-size:12px">Payment Structure</label>
    <select id="c_payments" class="modal-select" onchange="toggleCustom()">
      <option value="2">2 Payments</option>
      <option value="3">3 Payments</option>
      <option value="custom">Custom Installments</option>
    </select>
    <div id="custom_wrap" style="display:none">
      <input type="number" id="c_custom_amt" class="modal-input" placeholder="Amount Per Payment (e.g. 150)"/>
    </div>
    <input type="date" id="c_date" class="modal-input"/>
    <button class="login-btn" onclick="saveClient()">Create Project</button>
    <button onclick="closeModal()" style="background:none;color:#fff;margin-top:10px;width:100%">Cancel</button>
  </div>
</div>

<script>
const PASS = 'TRBFAMILY2014';
let clients = JSON.parse(localStorage.getItem('lab_clients') || '[]');

function tryLogin(){
  if(document.getElementById('passInput').value.toUpperCase() === PASS){
    document.getElementById('login-screen').classList.add('out');
    document.getElementById('dashboard').style.display = 'block';
    render();
  }
}

function switchTab(tab, el){
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  el.classList.add('active');
  document.getElementById(tab+'-panel').style.display = 'block';
}

function toggleCustom(){
  document.getElementById('custom_wrap').style.display = document.getElementById('c_payments').value === 'custom' ? 'block' : 'none';
}

function openModal(){ document.getElementById('clientModal').classList.add('show'); }
function closeModal(){ document.getElementById('clientModal').classList.remove('show'); }

function saveClient(){
  const name = document.getElementById('c_name').value;
  const total = parseFloat(document.getElementById('c_total').value);
  const type = document.getElementById('c_payments').value;
  const start = new Date(document.getElementById('c_date').value);
  let payments = [];

  if(type === 'custom'){
    const amt = parseFloat(document.getElementById('c_custom_amt').value);
    let rem = total;
    let i = 1;
    while(rem > 0){
      let current = Math.min(amt, rem);
      let d = new Date(start); d.setDate(d.getDate() + (i-1)*15);
      payments.push({num:i, amount:current, dueDate:d.toISOString().split('T')[0], paid:false});
      rem -= current; i++;
    }
  } else {
    const qty = parseInt(type);
    const amt = Math.round(total/qty);
    for(let i=0; i<qty; i++){
      let d = new Date(start); d.setDate(d.getDate() + i*15);
      payments.push({num:i+1, amount:amt, dueDate:d.toISOString().split('T')[0], paid:false});
    }
  }

  clients.push({id:Date.now(), name, total, payments});
  localStorage.setItem('lab_clients', JSON.stringify(clients));
  closeModal(); render();
}

function render(){
  const list = document.getElementById('clientsList');
  list.innerHTML = clients.map(c => `
    <div class="client-card">
      <strong>${c.name}</strong> - $${c.total}
      <div class="pay-schedule">${c.payments.map(p => `
        <div class="pay-block ${p.paid?'paid':''}" onclick="togglePay(${c.id},${p.num})">
          $${p.amount}<br/><small>${p.dueDate}</small>
        </div>`).join('')}
      </div>
    </div>`).join('');
  updateStats();
}

function togglePay(cid, pnum){
  const c = clients.find(x => x.id === cid);
  const p = c.payments.find(x => x.num === pnum);
  p.paid = !p.paid;
  localStorage.setItem('lab_clients', JSON.stringify(clients));
  render();
}

function updateStats(){
  let p=0, d=0, t=0;
  clients.forEach(c => {
    t += c.total;
    c.payments.forEach(pay => { if(pay.paid) p += pay.amount; else d += pay.amount; });
  });
  document.getElementById('statActive').textContent = clients.length;
  document.getElementById('statPaid').textContent = '$'+p;
  document.getElementById('statDue').textContent = '$'+d;
  document.getElementById('statPipeline').textContent = '$'+t;
}
</script>
</body>
</html>
