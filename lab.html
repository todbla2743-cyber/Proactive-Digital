<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Lab — Proactive Digital</title>
<meta name="robots" content="noindex, nofollow"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --teal:  #00BFC7;
  --blue:  #2159E0;
  --grad:  linear-gradient(120deg,#00BFC7,#2159E0);
  --bg:    #080B13;
  --bg2:   #0C1020;
  --bg3:   #111827;
  --surf:  #161D2E;
  --bdr:   rgba(255,255,255,0.06);
  --bdr2:  rgba(255,255,255,0.12);
  --tx:    #E8EAF6;
  --tx2:   #6B7A99;
  --fh:    'Outfit',sans-serif;
  --fb:    'Plus Jakarta Sans',sans-serif;
  --ease:  cubic-bezier(.22,1,.36,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--tx);
  font-family:var(--fb);font-size:15px;
  line-height:1.65;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
a{text-decoration:none;color:inherit}
button{font-family:var(--fb);border:none;cursor:pointer}

/* ── LOGIN SCREEN ── */
#login-screen {
  position:fixed;inset:0;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;
  transition:opacity .5s var(--ease),transform .5s var(--ease);
}
#login-screen.out{opacity:0;transform:scale(1.04);pointer-events:none}
.login-wrap{
  width:100%;max-width:400px;padding:24px;
  display:flex;flex-direction:column;align-items:center;
  gap:0;
}
/* Mesh behind login */
.login-mesh{
  position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 50% 40% at 70% 20%,rgba(0,191,199,.1) 0%,transparent 60%),
    radial-gradient(ellipse 40% 35% at 20% 80%,rgba(33,89,224,.08) 0%,transparent 60%);
  animation:mesh 10s ease-in-out infinite alternate;
}
@keyframes mesh{0%{opacity:.7}100%{opacity:1}}
.login-logo{
  margin-bottom:36px;
  animation:fadeUp .7s var(--ease) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.login-card{
  background:var(--surf);border:1px solid var(--bdr2);
  border-radius:16px;padding:40px 36px;
  width:100%;
  animation:fadeUp .7s .1s var(--ease) both;
  box-shadow:0 32px 80px rgba(0,0,0,.5);
}
.login-title{
  font-family:var(--fh);font-weight:600;
  font-size:22px;letter-spacing:-.5px;
  margin-bottom:6px;text-align:center;
}
.login-sub{color:var(--tx2);font-size:13px;text-align:center;margin-bottom:28px}
.login-label{
  display:block;font-size:11px;font-weight:700;
  color:var(--tx2);letter-spacing:1.5px;
  text-transform:uppercase;margin-bottom:8px;
}
.login-input{
  width:100%;background:var(--bg2);
  border:1.5px solid var(--bdr2);border-radius:9px;
  padding:13px 16px;color:var(--tx);
  font-family:var(--fb);font-size:15px;
  outline:none;transition:all .25s var(--ease);
  letter-spacing:2px;
}
.login-input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,191,199,.1)}
.login-btn{
  width:100%;margin-top:20px;padding:14px;
  background:var(--grad);color:#fff;
  border-radius:9px;font-family:var(--fh);
  font-size:15px;font-weight:600;
  transition:all .25s var(--ease);
}
.login-btn:hover{opacity:.9;transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,191,199,.3)}
.login-error{
  color:#F87171;font-size:13px;text-align:center;
  margin-top:12px;display:none;
}

/* ── DASHBOARD ── */
#dashboard{display:none}
#dashboard.show{display:block}

/* NAV */
.lab-nav{
  position:sticky;top:0;z-index:100;
  background:rgba(8,11,19,.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bdr);
  padding:14px 0;
}
.lab-nav-in{
  max-width:1200px;margin:0 auto;padding:0 28px;
  display:flex;align-items:center;justify-content:space-between;
}
.lab-nav-left{display:flex;align-items:center;gap:16px}
.lab-badge{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(0,191,199,.1);border:1px solid rgba(0,191,199,.2);
  border-radius:100px;padding:5px 14px;
  font-size:11px;font-weight:700;color:var(--teal);
  letter-spacing:1.5px;text-transform:uppercase;
}
.lab-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,191,199,.5)}50%{box-shadow:0 0 0 5px rgba(0,191,199,0)}}
.lab-title{font-family:var(--fh);font-weight:600;font-size:16px;letter-spacing:-.3px}
.lab-nav-right{display:flex;align-items:center;gap:12px}
.nav-time{color:var(--tx2);font-size:13px;font-family:monospace}
.logout-btn{
  background:var(--surf);border:1px solid var(--bdr2);
  border-radius:7px;padding:7px 16px;
  font-size:13px;font-weight:600;color:var(--tx2);
  transition:all .2s;
}
.logout-btn:hover{color:var(--tx);border-color:var(--bdr2)}

/* MAIN */
.lab-main{max-width:1200px;margin:0 auto;padding:36px 28px}

/* HEADER */
.lab-header{margin-bottom:36px}
.lab-greeting{
  font-family:var(--fh);font-weight:600;
  font-size:clamp(28px,4vw,42px);
  letter-spacing:-1.5px;margin-bottom:8px;
}
.lab-greeting span{
  background:var(--grad);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.lab-date{color:var(--tx2);font-size:14px}

/* CATEGORY FILTERS */
.cat-bar{
  display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px;
}
.cat-btn{
  padding:7px 18px;border-radius:100px;
  font-size:13px;font-weight:600;
  background:var(--surf);border:1px solid var(--bdr2);
  color:var(--tx2);transition:all .2s var(--ease);
}
.cat-btn:hover{border-color:var(--teal);color:var(--teal)}
.cat-btn.active{
  background:var(--grad);color:#fff;border-color:transparent;
}

/* TOOLBAR */
.news-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;flex-wrap:wrap;gap:12px;
}
.news-count{color:var(--tx2);font-size:13px}
.refresh-btn{
  display:flex;align-items:center;gap:8px;
  background:var(--surf);border:1px solid var(--bdr2);
  border-radius:8px;padding:9px 18px;
  font-size:13px;font-weight:600;color:var(--tx2);
  transition:all .25s var(--ease);
}
.refresh-btn:hover{border-color:var(--teal);color:var(--teal)}
.refresh-btn svg{transition:transform .5s var(--ease)}
.refresh-btn.spinning svg{animation:spin .7s linear}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* NEWS GRID */
.news-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:18px;
}
.news-card{
  background:var(--surf);border:1px solid var(--bdr);
  border-radius:14px;padding:24px;
  transition:all .3s var(--ease);
  display:flex;flex-direction:column;gap:12px;
  position:relative;overflow:hidden;
  cursor:pointer;
}
.news-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--grad);transform:scaleX(0);transform-origin:left;
  transition:transform .35s var(--ease);
}
.news-card:hover{
  transform:translateY(-4px);border-color:var(--bdr2);
  box-shadow:0 16px 48px rgba(0,0,0,.3);
}
.news-card:hover::before{transform:scaleX(1)}
.news-card-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.news-source-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--bg2);border:1px solid var(--bdr2);
  border-radius:100px;padding:3px 10px;
  font-size:11px;font-weight:700;color:var(--teal);
  letter-spacing:.5px;white-space:nowrap;
}
.news-time{color:var(--tx2);font-size:11px;white-space:nowrap}
.news-title{
  font-family:var(--fh);font-weight:600;
  font-size:16px;line-height:1.4;letter-spacing:-.2px;
  color:var(--tx);
}
.news-desc{color:var(--tx2);font-size:13px;line-height:1.7;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:4px;
}
.news-cat{
  font-size:11px;font-weight:600;color:var(--tx2);
  letter-spacing:1px;text-transform:uppercase;
}
.news-link{
  display:flex;align-items:center;gap:5px;
  font-size:12px;font-weight:600;color:var(--teal);
  transition:gap .2s;
}
.news-link:hover{gap:8px}

/* LOADING */
.loading-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:18px;
}
.skeleton{
  background:var(--surf);border:1px solid var(--bdr);
  border-radius:14px;padding:24px;
  display:flex;flex-direction:column;gap:12px;
}
.skel-line{
  height:12px;border-radius:6px;
  background:linear-gradient(90deg,var(--bg2) 0%,var(--bg3) 50%,var(--bg2) 100%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-line.s{width:35%}.skel-line.m{width:70%}.skel-line.l{width:90%}.skel-line.xl{width:100%}
.skel-line.h{height:18px}

/* EMPTY STATE */
.empty-state{
  text-align:center;padding:80px 20px;
  grid-column:1/-1;
}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.5}
.empty-title{font-family:var(--fh);font-weight:600;font-size:20px;margin-bottom:8px}
.empty-sub{color:var(--tx2);font-size:14px}

/* FEATURED (first card bigger) */
.news-card.featured{
  grid-column:span 2;
  flex-direction:row;gap:24px;align-items:flex-start;
}
.news-card.featured .news-title{font-size:20px}
.news-card.featured .news-desc{-webkit-line-clamp:3}

@media(max-width:768px){
  .news-card.featured{grid-column:span 1;flex-direction:column}
  .lab-greeting{font-size:26px}
}
@media(max-width:500px){
  .lab-main{padding:24px 16px}
  .news-grid{grid-template-columns:1fr}
  .cat-bar{gap:6px}
  .cat-btn{padding:6px 14px;font-size:12px}
}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-mesh"></div>
  <div class="login-wrap">
    <div class="login-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 290 54" height="40">
        <defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#00BFC7"/><stop offset="100%" stop-color="#2159E0"/></linearGradient></defs>
        <g transform="translate(0,6)"><rect x="0" y="0" width="3.5" height="30" rx="1.75" fill="url(#lg)"/><rect x="0" y="0" width="15" height="3.5" rx="1.75" fill="url(#lg)"/><rect x="0" y="15" width="15" height="3.5" rx="1.75" fill="url(#lg)"/><rect x="11.5" y="0" width="3.5" height="18.5" rx="1.75" fill="url(#lg)"/><polygon points="19,18 26,25 19,32" fill="none" stroke="url(#lg)" stroke-width="2.8" stroke-linejoin="round" stroke-linecap="round"/></g>
        <text x="38" y="28" font-family="'Outfit',sans-serif" font-weight="500" font-size="21" letter-spacing="3" fill="#E8EAF6">PROACTIVE</text>
        <text x="39.5" y="46" font-family="'Outfit',sans-serif" font-weight="300" font-size="13" letter-spacing="9" fill="url(#lg)">DIGITAL</text>
      </svg>
    </div>
    <div class="login-card">
      <div class="login-title">The Lab</div>
      <div class="login-sub">Private access only</div>
      <label class="login-label">Access Code</label>
      <input
        type="password"
        class="login-input"
        id="passInput"
        placeholder="Enter access code"
        autocomplete="off"
        onkeydown="if(event.key==='Enter')tryLogin()"
      />
      <button class="login-btn" onclick="tryLogin()">Enter The Lab →</button>
      <div class="login-error" id="loginErr">Incorrect access code. Try again.</div>
    </div>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard">

  <nav class="lab-nav">
    <div class="lab-nav-in">
      <div class="lab-nav-left">
        <div class="lab-badge"><span class="lab-dot"></span>The Lab</div>
        <div class="lab-title">Command Center</div>
      </div>
      <div class="lab-nav-right">
        <div class="nav-time" id="clock"></div>
        <button class="logout-btn" onclick="logout()">Sign Out</button>
      </div>
    </div>
  </nav>

  <main class="lab-main">

    <div class="lab-header">
      <div class="lab-greeting">Good <span id="greeting-time">morning</span>, Todd.</div>
      <div class="lab-date" id="lab-date"></div>
    </div>

    <!-- Category filters -->
    <div class="cat-bar" id="catBar">
      <button class="cat-btn active" onclick="filterCat('all',this)">All</button>
      <button class="cat-btn" onclick="filterCat('ai',this)">AI</button>
      <button class="cat-btn" onclick="filterCat('tech',this)">Tech</button>
      <button class="cat-btn" onclick="filterCat('business',this)">Business</button>
      <button class="cat-btn" onclick="filterCat('startups',this)">Startups</button>
    </div>

    <div class="news-toolbar">
      <div class="news-count" id="newsCount">Loading stories...</div>
      <button class="refresh-btn" id="refreshBtn" onclick="loadNews()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Refresh
      </button>
    </div>

    <div id="newsContainer">
      <!-- Skeleton loaders -->
      <div class="loading-grid" id="skeletons">
        ${Array(6).fill(0).map(()=>`
        <div class="skeleton">
          <div style="display:flex;justify-content:space-between">
            <div class="skel-line s"></div>
            <div class="skel-line" style="width:60px"></div>
          </div>
          <div class="skel-line h l"></div>
          <div class="skel-line m"></div>
          <div class="skel-line xl"></div>
          <div class="skel-line m"></div>
        </div>`).join('')}
      </div>
      <div class="news-grid" id="newsGrid" style="display:none"></div>
    </div>

  </main>
</div>

<script>
/* ── AUTH ── */
const PASS = 'TRBFAMILY2014';
let allArticles = [];
let currentCat = 'all';

function tryLogin() {
  const val = document.getElementById('passInput').value.trim().toUpperCase().replace(/\s+/g,'');
  if (val === PASS) {
    document.getElementById('login-screen').classList.add('out');
    setTimeout(() => {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').classList.add('show');
      initDashboard();
    }, 500);
  } else {
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('passInput').style.borderColor = '#F87171';
    setTimeout(() => {
      document.getElementById('passInput').style.borderColor = '';
    }, 1500);
  }
}

function logout() {
  document.getElementById('dashboard').classList.remove('show');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-screen').classList.remove('out');
  document.getElementById('passInput').value = '';
  document.getElementById('loginErr').style.display = 'none';
}

/* ── CLOCK ── */
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

/* ── GREETING ── */
function setGreeting() {
  const h = new Date().getHours();
  const g = h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
  document.getElementById('greeting-time').textContent = g;
  const opts = {weekday:'long',year:'numeric',month:'long',day:'numeric'};
  document.getElementById('lab-date').textContent = new Date().toLocaleDateString('en-US', opts);
}

/* ── NEWS ── */
// Using multiple free RSS-to-JSON sources
const FEEDS = [
  {
    url: 'https://api.rss2json.com/v1/api.json?rss_url=https://feeds.feedburner.com/TechCrunch',
    source: 'TechCrunch',
    cat: 'tech'
  },
  {
    url: 'https://api.rss2json.com/v1/api.json?rss_url=https://www.wired.com/feed/rss',
    source: 'Wired',
    cat: 'tech'
  },
  {
    url: 'https://api.rss2json.com/v1/api.json?rss_url=https://feeds.feedburner.com/venturebeat/SZYF',
    source: 'VentureBeat',
    cat: 'ai'
  },
  {
    url: 'https://api.rss2json.com/v1/api.json?rss_url=https://techcrunch.com/category/artificial-intelligence/feed/',
    source: 'TC/AI',
    cat: 'ai'
  },
  {
    url: 'https://api.rss2json.com/v1/api.json?rss_url=https://feeds.feedburner.com/entrepreneur/latest',
    source: 'Entrepreneur',
    cat: 'business'
  },
  {
    url: 'https://api.rss2json.com/v1/api.json?rss_url=https://techcrunch.com/category/startups/feed/',
    source: 'TC/Startups',
    cat: 'startups'
  }
];

function timeAgo(dateStr) {
  const diff = (Date.now() - new Date(dateStr)) / 1000;
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || '';
}

async function fetchFeed(feed) {
  try {
    const res = await fetch(feed.url);
    const data = await res.json();
    if (data.status === 'ok' && data.items) {
      return data.items.slice(0, 5).map(item => ({
        title: item.title,
        desc: stripHtml(item.description || item.content || '').slice(0,160),
        link: item.link,
        pubDate: item.pubDate,
        source: feed.source,
        cat: feed.cat
      }));
    }
  } catch(e) {}
  return [];
}

async function loadNews() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('skeletons').style.display = 'grid';
  document.getElementById('newsGrid').style.display = 'none';
  document.getElementById('newsCount').textContent = 'Loading stories...';

  const results = await Promise.allSettled(FEEDS.map(f => fetchFeed(f)));
  allArticles = results
    .filter(r => r.status === 'fulfilled')
    .flatMap(r => r.value)
    .filter(a => a.title)
    .sort((a,b) => new Date(b.pubDate) - new Date(a.pubDate));

  btn.classList.remove('spinning');
  renderNews(allArticles);
}

function filterCat(cat, el) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  const filtered = cat === 'all' ? allArticles : allArticles.filter(a => a.cat === cat);
  renderNews(filtered);
}

function renderNews(articles) {
  document.getElementById('skeletons').style.display = 'none';
  const grid = document.getElementById('newsGrid');
  grid.style.display = 'grid';

  if (!articles.length) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📡</div>
      <div class="empty-title">No stories found</div>
      <div class="empty-sub">Try refreshing or selecting a different category</div>
    </div>`;
    document.getElementById('newsCount').textContent = '0 stories';
    return;
  }

  document.getElementById('newsCount').textContent = `${articles.length} stories`;

  grid.innerHTML = articles.map((a, i) => `
    <div class="news-card${i===0?' featured':''}" onclick="window.open('${a.link}','_blank')">
      <div class="news-card-top">
        <span class="news-source-badge">${a.source}</span>
        <span class="news-time">${a.pubDate ? timeAgo(a.pubDate) : ''}</span>
      </div>
      <div class="news-title">${a.title}</div>
      ${a.desc ? `<div class="news-desc">${a.desc}</div>` : ''}
      <div class="news-footer">
        <span class="news-cat">${a.cat}</span>
        <span class="news-link">Read more →</span>
      </div>
    </div>
  `).join('');
}

/* ── INIT ── */
function initDashboard() {
  setGreeting();
  updateClock();
  setInterval(updateClock, 1000);
  loadNews();
}

// Allow Enter on password field
document.getElementById('passInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryLogin();
});
</script>
</body>
</html>
